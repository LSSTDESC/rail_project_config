CatalogTags:
  - CatalogTag:
      # This is for the flagship sims, which don't have the roman band yet
      name: "data_challenge_flagship"
      mag_column_template: "mag_{band}_lsst"
      mag_err_column_template: "mag_{band}_lsst_err"
      filter_template: "DC2LSST_{band}"
      band_list: ['u', 'g', 'r', 'i', 'z', 'y', 'Y', 'J', 'H']
      bands:
        u:
          mag_limit: 26.4
        g:
          mag_limit: 27.8
        r:
          mag_limit: 27.1
        i:
          mag_limit: 26.7
        z:
          mag_limit: 25.8
        y:
          mag_limit: 24.6
        Y:
          filter: euclid_Y
          mag_column_name: "mag_y_euclid"
          mag_err_column_name: "mag_y_euclid"
          mag_limit: 26.0
        J:
          filter: euclid_J
          mag_column_name: "mag_j_euclid"
          mag_err_column_name: "mag_j_euclid"
          mag_limit: 26.0
        H:
          filter: euclid_H
          mag_column_name: "mag_h_euclid"
          mag_err_column_name: "mag_h_euclid"
          mag_limit: 26.0
  - CatalogTag:
      # This is for the roman rubin sims, which don't have the euclids band yet
      name: "data_challenge_roman_rubin"
      mag_column_template: "mag_{band}_lsst"
      mag_err_column_template: "mag_{band}_lsst_err"
