        g:
          mag_limit: 27.8
        r:
          mag_limit: 27.1
        i:
          mag_limit: 26.7
        z:
          mag_limit: 25.8
        y:
          mag_limit: 24.6
        Y:
          filter: roman_Y106
          mag_column_name: "mag_Y_roman"
          mag_err_column_name: "mag_Y_roman_err"
          mag_limit: 26.5
        J:
          filter: roman_J129
          mag_column_name: "mag_J_roman"
          mag_err_column_name: "mag_J_roman_err"
          mag_limit: 26.5
        H:
