          mag_column_name: "mag_H_roman"
          mag_err_column_name: "mag_H_roman_err"
          mag_limit: 26.5
  - CatalogTag:
      # This is for the cardinal sims
      name: "data_challenge_cardinal"
      mag_column_template: "mag_{band}_lsst"
      mag_err_column_template: "mag_{band}_lsst_err"
      filter_template: "DC2LSST_{band}"
      band_list: ['u', 'g', 'r', 'i', 'z', 'y', 'Y', 'J', 'H', 'y_euclid', 'j_euclid', 'h_euclid']
      bands:
        u:
          mag_limit: 26.4
