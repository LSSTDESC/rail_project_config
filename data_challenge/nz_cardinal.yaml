Project:

  Name: pz_challenge

  Includes:
    - "${RAIL_PROJECT_CONFIG_DIR}/data_challenge/nz_preparation_library.yaml"

  # These are used to make all the other paths
  CommonPaths:
    sim_version: cardinal

  Flavors:
    - Flavor:
        name: cardinal
        catalog_tag: cardinal_roman_rubin
        pipeline_overrides:
          truth_to_observed:
            kwargs:
              selectors: ['DESI_BGS_color', 'DESI_LRG_color', 'DESI_ELG_LOP_color', 'zCOSMOS', 'VVDSf02', 'DEEP2_LSST', 'COSMOS2020']
    - Flavor:
        name: cardinal_blended
        catalog_tag: cardinal_roman_rubin
        pipeline_overrides:
          truth_to_observed:
            kwargs:
              blending: true
              selectors: ['DESI_BGS_color', 'DESI_LRG_color', 'DESI_ELG_LOP_color', 'zCOSMOS', 'VVDSf02', 'DEEP2_LSST', 'COSMOS2020']


  # These are variables that we iterate over when running over entire catalogs
  IterationVars:
    pix:
      - 19
      # - 20
      - 22
      - 25
      - 27
      - 28
      - 30
