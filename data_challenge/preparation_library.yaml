# These describe all the algorithms that emulate spectroscopic selections
SpecSelections:
  - SpecSelection:
      name: VVDSf02
      Select: SpecSelection_VVDSf02
      Module: rail.creation.degraders.spectroscopic_selections
  - SpecSelection:
      name: zCOSMOS
      Select: SpecSelection_zCOSMOS
      Module: rail.creation.degraders.spectroscopic_selections
  - SpecSelection:
      name: DEEP2_LSST
      Select: SpecSelection_DEEP2_LSST
      Module: rail.creation.degraders.spectroscopic_selections
  - SpecSelection:
      name: DESI_BGS_flagship
      Select: SpecSelection_DESI_Phy
      Module: rail.creation.degraders.desi_selector_phy
      Overrides:
        desi_type: "bgs"
        threshold_col: "lm_halo"
        threshold_table: "/global/cfs/cdirs/lsst/groups/PZ/data/desi_thresholds/bgs_threshold_flagship.parquet"
  - SpecSelection:
      name: DESI_LRG_flagship
      Select: SpecSelection_DESI_Phy
      Module: rail.creation.degraders.desi_selector_phy
      Overrides:
        desi_type: "lrg"
        threshold_col: "log_stellar_mass"
        threshold_table: "/global/cfs/cdirs/lsst/groups/PZ/data/desi_thresholds/lrg_threshold_flagship.parquet"
  - SpecSelection:
      name: DESI_ELG_flagship
      Select: SpecSelection_DESI_Phy
      Module: rail.creation.degraders.desi_selector_phy
      Overrides:
        desi_type: "elg"
        threshold_col: "log_sfr"
        threshold_table: "/global/cfs/cdirs/lsst/groups/PZ/data/desi_thresholds/elg_threshold_flagship.parquet"
  - SpecSelection:
      name: DESI_BGS_color
      Select: SpecSelection_DESI_BGS
      Module: rail.creation.degraders.spectroscopic_selections
  - SpecSelection:
      name: DESI_LRG_color
      Select: SpecSelection_DESI_LRG
      Module: rail.creation.degraders.spectroscopic_selections
  - SpecSelection:
      name: DESI_ELG_LOP_color
      Select: SpecSelection_DESI_ELG_LOP
      Module: rail.creation.degraders.spectroscopic_selections
  - SpecSelection:
      name: COSMOS2020
      Select: GaussianSkewtScatterSelector
      Module: rail.creation.degraders.gaussian_skewt_scatter_selector
      Overrides:
        col_name: redshift_manyband
        col_name_mag_i: mag_i_lsst
        col_name_z: redshift


# These are the classes that we used to merge data from different files
# in particular, to merge the spectroscopic selections
Mergers:
  - Merger:
      name: spec_selection
      Merge: SpecSelectionMerger
      Module: rail.projects.merger


# These are the various ways we merge the spectrscopic selections
Merges:
  - Merge:
      # merge all the selections run on the 'lsst_10yr' photometric smearing
      name: select_lsst_obs_cond_10yr_all_cardinal
      inputs:
        DEEP2_LSST: output_select_lsst_obs_cond_10yr_DEEP2_LSST.pq
        DESI_BGS: output_select_lsst_obs_cond_10yr_DESI_BGS_color.pq
        DESI_ELG_LOP: output_select_lsst_obs_cond_10yr_DESI_ELG_LOP_color.pq
        DESI_LRG: output_select_lsst_obs_cond_10yr_DESI_LRG_color.pq
        VVDSf02: output_select_lsst_obs_cond_10yr_VVDSf02.pq
        zCOSMOS: output_select_lsst_obs_cond_10yr_zCOSMOS.pq
      output_basename: output_select_lsst_obs_cond_10yr_all.pq
      merge_col: object_id
  - Merge:
      # merge all the selections run on the 'lsst_1yr' photometric smearing
      name: select_lsst_obs_cond_1yr_all_cardinal
      inputs:
        DEEP2_LSST: output_select_lsst_obs_cond_1yr_DEEP2_LSST.pq
        DESI_BGS: output_select_lsst_obs_cond_1yr_DESI_BGS_color.pq
        DESI_ELG_LOP: output_select_lsst_obs_cond_1yr_DESI_ELG_LOP_color.pq
        DESI_LRG: output_select_lsst_obs_cond_1yr_DESI_LRG_color.pq
        VVDSf02: output_select_lsst_obs_cond_1yr_VVDSf02.pq
        zCOSMOS: output_select_lsst_obs_cond_1yr_zCOSMOS.pq
      output_basename: output_select_lsst_obs_cond_1yr_all.pq
      merge_col: object_id
  - Merge:
      # merge all the selections run on the 'lsst_10yr' photometric smearing
      name: select_lsst_obs_cond_10yr_all_flagship
      inputs:
        DEEP2_LSST: output_select_lsst_obs_cond_10yr_DEEP2_LSST.pq
        DESI_BGS: output_select_lsst_obs_cond_10yr_DESI_BGS_flagship.pq
        DESI_ELG_LOP: output_select_lsst_obs_cond_10yr_DESI_ELG_flagship.pq
        DESI_LRG: output_select_lsst_obs_cond_10yr_DESI_LRG_flagship.pq
        VVDSf02: output_select_lsst_obs_cond_10yr_VVDSf02.pq
        zCOSMOS: output_select_lsst_obs_cond_10yr_zCOSMOS.pq
      output_basename: output_select_lsst_obs_cond_10yr_all.pq
      merge_col: object_id
  - Merge:
      # merge all the selections run on the 'lsst_1yr' photometric smearing
      name: select_lsst_obs_cond_1yr_all_flagship
      inputs:
        DEEP2_LSST: output_select_lsst_obs_cond_1yr_DEEP2_LSST.pq
        DESI_BGS: output_select_lsst_obs_cond_1yr_DESI_BGS_flagship.pq
        DESI_ELG_LOP: output_select_lsst_obs_cond_1yr_DESI_ELG_flagship.pq
        DESI_LRG: output_select_lsst_obs_cond_1yr_DESI_LRG_flagship.pq
        VVDSf02: output_select_lsst_obs_cond_1yr_VVDSf02.pq
        zCOSMOS: output_select_lsst_obs_cond_1yr_zCOSMOS.pq
      output_basename: output_select_lsst_obs_cond_1yr_all.pq
      merge_col: object_id


# These are the classes that we use to subsample the data
# I.e., to build a single test/train file from an input catalog
Subsamplers:
  - Subsampler:
      # This one randomly grabs a set of objects from a single type of file
      name: random_subsampler
      Subsample: RandomSubsampler
      Module: rail.projects.subsampler
  - Subsampler:
      # This one combines information from a few files, e.g., roman, rubin, euclid
      name: multi_catalog_subsampler
      Subsample: MultiCatalogSubsampler
      Module: rail.projects.subsampler

# These describe ways to subsample the data
Subsamples:
  - Subsample:
      # Combine roman and rubin 1yr and grab 100k events for training
      name: "taskset_1_train_1yr"
      object_id_col: "object_id"
      seed: 1230
      num_objects: 100000
      inputs:
        rubin:
          basename: output_deredden_lsst_obs_cond_1yr.pq
          bands: ['u', 'g', 'r', 'i', 'z', 'y']
          mag_band_name_template: "mag_{band}_lsst"
