# These are templates for catalogs produced in the early stages of the analysis
Catalogs:
  - CatalogTemplate:
      name: truth_roman_rubin
      path_template: "{catalogs_dir}/{project}_roman_rubin/{pixel}/part-0.parquet"
      iteration_vars: ['pixel']
  - CatalogTemplate:
      name: truth_cardinal
      path_template: "{catalogs_dir}/{project}_cardinal/parquet_files/Chinchilla-3-triofile.{pixel}.parquet"
      iteration_vars: ['pixel']
  - CatalogTemplate:
      name: truth_flagship
      path_template: "{catalogs_dir}/{project}_flagship/Flagship/euclid_fs2_mock_dr_v1_1_phz.pix{pixel}.pq"
      iteration_vars: ['pixel']
  - CatalogTemplate:
      name: reduced
      path_template: "{reduced_dir}/{project}_{selection}/{pixel}/part-0.pq"
      iteration_vars: ['pixel']
  - CatalogTemplate:
      name: degraded
      path_template: "{catalogs_dir}/{project}_{selection}_{flavor}/{pixel}/{basename}"
      iteration_vars: ['pixel']


# These are templates for specific files, such as testing and training files
Files:
  - FileTemplate:
      name: test_file_100k
      path_template: "{catalogs_dir}/test/{project}_{selection}_baseline_100k.hdf5"
  - FileTemplate:
      name: train_file_100k
      path_template: "{catalogs_dir}/train/{project}_{selection}_baseline_100k.hdf5"
  # - FileTemplate:
  #     name: threshold_table_lrg
  #     path_template: "/global/cfs/cdirs/desc-pz/users/tqzhang/data_challenge/desi_threshold/roman_rubin_desi_thresh/lrg_threshold.parquet"


# These describe all the algorithms that emulate spectroscopic selections
SpecSelections:
  # - SpecSelection:
  #      name: GAMA:
  #      Select: SpecSelection_GAMA
  #      Module: rail.creation.degraders.spectroscopic_selections
  - SpecSelection:
       name: BOSS
       Select: SpecSelection_BOSS
       Module: rail.creation.degraders.spectroscopic_selections
  - SpecSelection:
       name: DEEP2_LSST
       Select: SpecSelection_DEEP2_LSST
       Module: rail.creation.degraders.spectroscopic_selections
  - SpecSelection:
       name: VVDSf02
       Select: SpecSelection_VVDSf02
       Module: rail.creation.degraders.spectroscopic_selections
  - SpecSelection:
      name: zCOSMOS
      Select: SpecSelection_zCOSMOS
      Module: rail.creation.degraders.spectroscopic_selections
  - SpecSelection:
      name: HSC
      Select: SpecSelection_HSC
      Module: rail.creation.degraders.spectroscopic_selections
  - SpecSelection:
      name: DESI_BGS
      Select: SpecSelection_DESI_Phy
      Module: rail.creation.degraders.desi_selector_phy
      Overrides:
        desi_type: "bgs"
        threshold_col: "sod_halo_mass"
        threshold_table: "/global/cfs/cdirs/desc-pz/users/tqzhang/data_challenge/desi_threshold/roman_rubin_desi_thresh/bgs_threshold.parquet"
  - SpecSelection:
      name: DESI_LRG
      Select: SpecSelection_DESI_Phy
      Module: rail.creation.degraders.desi_selector_phy
      Overrides:
        desi_type: "lrg"
        threshold_col: "logsm_obs"
        threshold_table: "/global/cfs/cdirs/desc-pz/users/tqzhang/data_challenge/desi_threshold/roman_rubin_desi_thresh/lrg_threshold.parquet"
  - SpecSelection:
      name: DESI_ELG
      Select: SpecSelection_DESI_Phy
      Module: rail.creation.degraders.desi_selector_phy
      Overrides:
        desi_type: "elg"
        threshold_col: "sfr"
        threshold_table: "/global/cfs/cdirs/desc-pz/users/tqzhang/data_challenge/desi_threshold/roman_rubin_desi_thresh/elg_threshold.parquet"
  - SpecSelection:
      name: DESI_BGS_flagship
      Select: SpecSelection_DESI_Phy
      Module: rail.creation.degraders.desi_selector_phy
      Overrides:
        desi_type: "bgs"
        threshold_col: "lm_halo"
        threshold_table: "/global/cfs/cdirs/desc-pz/users/tqzhang/data_challenge/desi_threshold/flagship_desi_thresh/bgs_threshold.parquet"
  - SpecSelection:
      name: DESI_LRG_flagship
      Select: SpecSelection_DESI_Phy
      Module: rail.creation.degraders.desi_selector_phy
      Overrides:
        desi_type: "lrg"
        threshold_col: "log_stellar_mass"
        threshold_table: "/global/cfs/cdirs/desc-pz/users/tqzhang/data_challenge/desi_threshold/flagship_desi_thresh/lrg_threshold.parquet"
  - SpecSelection:
      name: DESI_ELG_flagship
      Select: SpecSelection_DESI_Phy
      Module: rail.creation.degraders.desi_selector_phy
      Overrides:
        desi_type: "elg"
        threshold_col: "log_sfr"
        threshold_table: "/global/cfs/cdirs/desc-pz/users/tqzhang/data_challenge/desi_threshold/flagship_desi_thresh/elg_threshold.parquet"
  - SpecSelection:
      name: DESI_BGS_color
      Select: SpecSelection_DESI_BGS
      Module: rail.creation.degraders.spectroscopic_selections
  - SpecSelection:
      name: DESI_LRG_color
      Select: SpecSelection_DESI_LRG
      Module: rail.creation.degraders.spectroscopic_selections
  - SpecSelection:
      name: DESI_ELG_LOP_color
      Select: SpecSelection_DESI_ELG_LOP
      Module: rail.creation.degraders.spectroscopic_selections



# These describe all the algorithms that estimate PZ
PZAlgorithms:
  - PZAlgorithm:
      name: trainz
      Estimate: TrainZEstimator
      Inform: TrainZInformer
      Module: rail.estimation.algos.train_z
  - PZAlgorithm:
      name: simplenn
      Estimate: SklNeurNetEstimator
      Inform: SklNeurNetInformer
      Module: rail.estimation.algos.sklearn_neurnet
  - PZAlgorithm:
      name: fzboost
      Estimate: FlexZBoostEstimator
      Inform: FlexZBoostInformer
      Module: rail.estimation.algos.flexzboost
  - PZAlgorithm:
      name: knn
      Estimate: KNearNeighEstimator
      Inform: KNearNeighInformer
      Module: rail.estimation.algos.k_nearneigh
  - PZAlgorithm:
      name: gpz
      Estimate: GPzEstimator
      Inform: GPzInformer
      Module: rail.estimation.algos.gpz
  - PZAlgorithm:
      name: bpz
      Estimate: BPZliteEstimator
      Inform: BPZliteInformer
      Module: rail.estimation.algos.bpz_lite
  - PZAlgorithm:
      name: tpz
      Estimate: TPZliteEstimator
      Inform: TPZliteInformer
      Module: rail.estimation.algos.tpz_lite


# These describe the ways we can sub-sample the data
Subsamplers:
  - Subsampler:
      name: random_subsampler
      Subsample: RandomSubsampler
      Module: rail.projects.subsampler
  - Subsampler:
      name: multi_catalog_subsampler
      Subsample: MultiCatalogSubsampler
      Module: rail.projects.subsampler


# These describe the ways we can reduce the data
Reducers:
  - Reducer:
      name: roman_rubin
      Reduce: RomanRubinReducer
      Module: rail.projects.reducer
  - Reducer:
      name: flagship
      Reduce: FlagshipReducer
      Module: rail.projects.reducer
  - Reducer:
      name: cardinal
      Reduce: CardinalReducer
      Module: rail.projects.reducer


# These describe the selections going from Input to Reduced catalog
Selections:
  - Selection:
      name: roman_rubin_gold
      cuts:
        maglim_i: [null, 25.5]
  - Selection:
      name: cardinal_gold
      cuts:
        maglim_i: [null, 25.5]
  - Selection:
      name: flagship_gold
      cuts:
        maglim_i: [null, 25.5]
  - Selection:
      name: deep
      cuts:
        maglim_i: [null, 27.0]


# These describe ways to subsampe the data
Subsamples:
  - Subsample:
      name: test_100k
      seed: 1234
      num_objects: 100000
  - Subsample:
      name: train_100k
      seed: 4321
      num_objects: 100000
  - Subsample:
      name: "train_wfd_1yr_100k"
      object_id_col: 'ra'
      seed: 1234
      num_objects: 100000
      inputs:
        rubin:
          basename: output_deredden_lsst_obs_cond_1yr.pq
          bands: ['u', 'g', 'r', 'i', 'z', 'y']
          mag_band_name_template: "LSST_obs_{band}"
          mag_err_band_name_template: "LSST_obs_{band}_err"
          extra_cols: []
        roman:
          basename: output_deredden_roman_medium.pq
          bands: ['Y106', 'J129', 'H158']
          mag_band_name_template: "ROMAN_obs_{band}"
          mag_err_band_name_template: "ROMAN_obs_{band}_err"
          extra_cols: []


# These describe the error models we use in the truth_to_observed pipeline
ErrorModels:
  - ErrorModel:
      name: lsst
      ErrorModel: LSSTErrorModel
      Module: rail.creation.degraders.photometric_errors
  - ErrorModel:
      name: lsst_obs_cond_1yr
      ErrorModel: ObsCondition
      Module: rail.creation.degraders.observing_condition_degrader
      Bands: ['u', 'g', 'r', 'i', 'z', 'y']
      Overrides:
        # also overwrite km if the PhotErr default value differ from LSST specific value
        hdf5_groupname: ''
        mask: "${PZ_DATA_AREA}/survey_conditions/baseline_v5.1_maps/masks/WFD-mask-nside-128.fits"
        map_dict:
          m5:
            u: "${PZ_DATA_AREA}/survey_conditions/baseline_v5.1_maps/Y1/WFD/baseline_v5_1_0_10yrs_ExgalM5_u-band-1-year-wfd_HEAL.fits"
            g: "${PZ_DATA_AREA}/survey_conditions/baseline_v5.1_maps/Y1/WFD/baseline_v5_1_0_10yrs_ExgalM5_g-band-1-year-wfd_HEAL.fits"
            r: "${PZ_DATA_AREA}/survey_conditions/baseline_v5.1_maps/Y1/WFD/baseline_v5_1_0_10yrs_ExgalM5_r-band-1-year-wfd_HEAL.fits"
            i: "${PZ_DATA_AREA}/survey_conditions/baseline_v5.1_maps/Y1/WFD/baseline_v5_1_0_10yrs_ExgalM5_i-band-1-year-wfd_HEAL.fits"
            z: "${PZ_DATA_AREA}/survey_conditions/baseline_v5.1_maps/Y1/WFD/baseline_v5_1_0_10yrs_ExgalM5_z-band-1-year-wfd_HEAL.fits"
            y: "${PZ_DATA_AREA}/survey_conditions/baseline_v5.1_maps/Y1/WFD/baseline_v5_1_0_10yrs_ExgalM5_y-band-1-year-wfd_HEAL.fits"
          nYrObs: 1.  # do not change this as we use coadd depth map
          nVisYr:  # do not change this as we use coadd depth map
            u: 1.
            g: 1.
            r: 1.
            i: 1.
            z: 1.
            y: 1.
          theta:
            u: "${PZ_DATA_AREA}/survey_conditions/baseline_v5.1_maps/Y1/WFD/baseline_v5_1_0_10yrs_Median_seeingFwhmEff_u-band-1-year-wfd_HEAL.fits"
            g: "${PZ_DATA_AREA}/survey_conditions/baseline_v5.1_maps/Y1/WFD/baseline_v5_1_0_10yrs_Median_seeingFwhmEff_g-band-1-year-wfd_HEAL.fits"
            r: "${PZ_DATA_AREA}/survey_conditions/baseline_v5.1_maps/Y1/WFD/baseline_v5_1_0_10yrs_Median_seeingFwhmEff_r-band-1-year-wfd_HEAL.fits"
            i: "${PZ_DATA_AREA}/survey_conditions/baseline_v5.1_maps/Y1/WFD/baseline_v5_1_0_10yrs_Median_seeingFwhmEff_i-band-1-year-wfd_HEAL.fits"
            z: "${PZ_DATA_AREA}/survey_conditions/baseline_v5.1_maps/Y1/WFD/baseline_v5_1_0_10yrs_Median_seeingFwhmEff_z-band-1-year-wfd_HEAL.fits"
            y: "${PZ_DATA_AREA}/survey_conditions/baseline_v5.1_maps/Y1/WFD/baseline_v5_1_0_10yrs_Median_seeingFwhmEff_y-band-1-year-wfd_HEAL.fits"
          airmass: 0.  # do not change this as we use effective theta, which accounts for dependence on airmass
          minorCol: minor
          majorCol: major
          extendedType: gaap
          aMin: 1.5  # from Gaap1p0
          highSNR: true  # found to fit the photometric error better at faint end
