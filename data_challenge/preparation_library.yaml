# Project name
Name: pz_challenge


# Catalog definitions
CatalogLib:
  - "${RAIL_PROJECT_CONFIG_DIR}/data_challenge/catalogs.yaml"


# Templates for various paths
PathTemplates: {}


# These are used to make all the other paths
CommonPaths:
  parent: pz_challenge
  project: pz_challenge
  root: "{PZ_BASE_AREA}"
  scratch_root: "{root}"
  catalogs_dir: "{root}/data"


# Baseline configuraiton, included in others by default
Baseline:
  catalog_tag: roman_rubin
  pipelines: ['all']


# These are templates for catalogs produced in the early stages of the analysis
Catalogs:
  # roman rubin (open universe) sims
  - CatalogTemplate:
      name: truth_roman_rubin
      path_template: "{catalogs_dir}/{parent}_{sim_version}/{pixel}/part-0.parquet"
      iteration_vars: ['pixel']
  # cardinal sims
  - CatalogTemplate:
      name: truth_cardinal
      path_template: "{catalogs_dir}/{parent}_{sim_version}/parquet_files/Chinchilla-3-triofile.{pixel}.parquet"
      iteration_vars: ['pixel']
  # flagship sims
  - CatalogTemplate:
      name: truth_flagship
      path_template: "{catalogs_dir}/{parent}_{sim_version}/Flagship/Roman/euclid_fs2_mock_dr_v1_1_phz_wNIR.pix{pixel}.pq"
      iteration_vars: ['pixel']
  # Generic reduced catalogs
  - CatalogTemplate:
      name: reduced
      path_template: "{catalogs_dir}/{project}_{sim_version}_{selection}/{pixel}/part-0.pq"
      iteration_vars: ['pixel']
  # Generic degraed catalogs
  - CatalogTemplate:
      name: degraded
      path_template: "{catalogs_dir}/{project}_{sim_version}_{selection}_{flavor}/{pixel}/{basename}"
      iteration_vars: ['pixel']


# These are templates for specific files, such as testing and training files
Files:
  - FileTemplate:
      name: taskset_1_train_file_1yr
      path_template: "{catalogs_dir}/public/{project}_taskset_1_{sim_version}_training_1yr.hdf5"
  - FileTemplate:
      name: taskset_1_test_file_1yr
      path_template: "{catalogs_dir}/reserved/{project}_taskset_1_{sim_version}_test_1yr.hdf5"
  - FileTemplate:
      name: taskset_1_train_file_10yr
      path_template: "{catalogs_dir}/public/{project}_taskset_1_{sim_version}_training_10yr.hdf5"
  - FileTemplate:
      name: taskset_1_test_file_10yr
      path_template: "{catalogs_dir}/reserved/{project}_taskset_1_{sim_version}_test_10yr.hdf5"
  - FileTemplate:
      name: taskset_2_train_file_1yr
      path_template: "{catalogs_dir}/public/{project}_taskset_2_{sim_version}_training_1yr.hdf5"
  - FileTemplate:
      name: taskset_2_test_file_1yr
      path_template: "{catalogs_dir}/reserved/{project}_taskset_2_{sim_version}_test_1yr.hdf5"
  - FileTemplate:
      name: taskset_2_train_file_10yr
      path_template: "{catalogs_dir}/public/{project}_taskset_2_{sim_version}_training_10yr.hdf5"
  - FileTemplate:
      name: taskset_2_test_file_10yr
      path_template: "{catalogs_dir}/reserved/{project}_taskset_2_{sim_version}_test_10yr.hdf5"
  - FileTemplate:
      name: taskset_3_train_file_1yr
      path_template: "{catalogs_dir}/public/{project}_taskset_3_{sim_version}_training_1yr.hdf5"
  - FileTemplate:
      name: taskset_3_test_file_1yr
      path_template: "{catalogs_dir}/reserved/{project}_taskset_3_{sim_version}_test_1yr.hdf5"
  - FileTemplate:
      name: taskset_3_train_file_10yr
      path_template: "{catalogs_dir}/public/{project}_taskset_3_{sim_version}_training_10yr.hdf5"
  - FileTemplate:
      name: taskset_3_test_file_10yr
      path_template: "{catalogs_dir}/reserved/{project}_taskset_3_{sim_version}_test_10yr.hdf5"


# These describe the ways we can reduce the data
# i.e., going from truth to reduced catalogs by
# applying cuts, dropping and remapping columns
# to standard formats
Reducers:
  - Reducer:
      name: roman_rubin
      Reduce: RomanRubinReducer
      Module: rail.projects.reducer
  - Reducer:
      name: flagship
      Reduce: FlagshipReducer
      Module: rail.projects.reducer
  - Reducer:
      name: cardinal
      Reduce: CardinalReducer
      Module: rail.projects.reducer


# These describe the selections going from Truth to Reduced catalog
# These are applied by the reducers
Selections:
  - Selection:
      name: gold
      cuts:
        maglim_i: [null, 25.5]
      healpix_cuts:
        ra_col: ra
        dec_col: dec
        nside: 32
        nest: false
        pixels: [9921, 9922, 9923, 9924, 10050, 10051, 10052, 10053, 10177, 10178, 10179, 10180, 10181, 10305, 10306, 10307, 10308, 10429, 10430, 10431, 10432, 10549, 10550, 10551, 10552, 10665, 10666, 10667, 10668, 10777, 10778, 10779]
  - Selection:
      name: deep
      cuts:
        maglim_i: [null, 27.0]


# These describe the various ceci-based data analysis pipelines
Pipelines:
  - PipelineTemplate:
      # Do photometric smearing, spec selection and optionally blending
      name: truth_to_observed
      pipeline_class: rail.pipelines.degradation.truth_to_observed.TruthToObservedPipeline
      input_catalog_template: reduced
      output_catalog_template: degraded
      kwargs:
        error_models: ['all']
        selectors: ['all']
        models_to_run_select: ['lsst_obs_cond_1yr', 'lsst_obs_cond_4yr', 'lsst_obs_cond_10yr']
        blending: false
        parallel: true


# These describe the error models we use in the truth_to_observed pipeline
ErrorModels:
  - ErrorModel:
      name: lsst_obs_cond_1yr
      ErrorModel: ObsCondition
      Module: rail.creation.degraders.observing_condition_degrader
      Bands: ['u', 'g', 'r', 'i', 'z', 'y']
      Overrides:
        # also overwrite km if the PhotErr default value differ from LSST specific value
        hdf5_groupname: ''
        mask: "${PZ_DATA_AREA}/survey_conditions/baseline_v5.1_maps/masks/WFD-mask-nside-128.fits"
        map_dict:
          m5:
            u: "${PZ_DATA_AREA}/survey_conditions/baseline_v5.1_maps/Y1/WFD/baseline_v5_1_0_10yrs_ExgalM5_u-band-1-year-wfd_HEAL.fits"
            g: "${PZ_DATA_AREA}/survey_conditions/baseline_v5.1_maps/Y1/WFD/baseline_v5_1_0_10yrs_ExgalM5_g-band-1-year-wfd_HEAL.fits"
            r: "${PZ_DATA_AREA}/survey_conditions/baseline_v5.1_maps/Y1/WFD/baseline_v5_1_0_10yrs_ExgalM5_r-band-1-year-wfd_HEAL.fits"
            i: "${PZ_DATA_AREA}/survey_conditions/baseline_v5.1_maps/Y1/WFD/baseline_v5_1_0_10yrs_ExgalM5_i-band-1-year-wfd_HEAL.fits"
            z: "${PZ_DATA_AREA}/survey_conditions/baseline_v5.1_maps/Y1/WFD/baseline_v5_1_0_10yrs_ExgalM5_z-band-1-year-wfd_HEAL.fits"
            y: "${PZ_DATA_AREA}/survey_conditions/baseline_v5.1_maps/Y1/WFD/baseline_v5_1_0_10yrs_ExgalM5_y-band-1-year-wfd_HEAL.fits"
          nYrObs: 1.  # do not change this as we use coadd depth map
          nVisYr:  # do not change this as we use coadd depth map
            u: 1.
            g: 1.
            r: 1.
            i: 1.
            z: 1.
            y: 1.
          theta:
            u: "${PZ_DATA_AREA}/survey_conditions/baseline_v5.1_maps/Y1/WFD/baseline_v5_1_0_10yrs_Median_seeingFwhmEff_u-band-1-year-wfd_HEAL.fits"
            g: "${PZ_DATA_AREA}/survey_conditions/baseline_v5.1_maps/Y1/WFD/baseline_v5_1_0_10yrs_Median_seeingFwhmEff_g-band-1-year-wfd_HEAL.fits"
            r: "${PZ_DATA_AREA}/survey_conditions/baseline_v5.1_maps/Y1/WFD/baseline_v5_1_0_10yrs_Median_seeingFwhmEff_r-band-1-year-wfd_HEAL.fits"
            i: "${PZ_DATA_AREA}/survey_conditions/baseline_v5.1_maps/Y1/WFD/baseline_v5_1_0_10yrs_Median_seeingFwhmEff_i-band-1-year-wfd_HEAL.fits"
            z: "${PZ_DATA_AREA}/survey_conditions/baseline_v5.1_maps/Y1/WFD/baseline_v5_1_0_10yrs_Median_seeingFwhmEff_z-band-1-year-wfd_HEAL.fits"
            y: "${PZ_DATA_AREA}/survey_conditions/baseline_v5.1_maps/Y1/WFD/baseline_v5_1_0_10yrs_Median_seeingFwhmEff_y-band-1-year-wfd_HEAL.fits"
          airmass: 0.  # do not change this as we use effective theta, which accounts for dependence on airmass
          minorCol: minor
          majorCol: major
          extendedType: gaap
          aMin: 1.5  # from Gaap1p0
          highSNR: false
  - ErrorModel:
      name: lsst_obs_cond_4yr
      ErrorModel: ObsCondition
      Module: rail.creation.degraders.observing_condition_degrader
      Bands: ['u', 'g', 'r', 'i', 'z', 'y']
