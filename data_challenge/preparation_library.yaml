# These are templates for catalogs produced in the early stages of the analysis
Catalogs:
  - CatalogTemplate:
      name: truth_roman_rubin
      path_template: "{catalogs_dir}/{parent}_{sim_version}/{pixel}/part-0.parquet"
      iteration_vars: ['pixel']
  - CatalogTemplate:
      name: truth_cardinal
      path_template: "{catalogs_dir}/{parent}_{sim_version}/parquet_files/Chinchilla-3-triofile.{pixel}.parquet"
      iteration_vars: ['pixel']
  - CatalogTemplate:
      name: truth_flagship
      path_template: "{catalogs_dir}/{parent}_{sim_version}/Flagship/euclid_fs2_mock_dr_v1_1_phz.pix{pixel}.pq"
      iteration_vars: ['pixel']
  - CatalogTemplate:
      name: reduced
      path_template: "{catalogs_dir}/{project}_{sim_version}_{selection}/{pixel}/part-0.pq"
      iteration_vars: ['pixel']
  - CatalogTemplate:
      name: degraded
      path_template: "{catalogs_dir}/{project}_{sim_version}_{selection}_{flavor}/{pixel}/{basename}"
      iteration_vars: ['pixel']


# These are templates for specific files, such as testing and training files
Files:
  - FileTemplate:
      name: test_file_100k
      path_template: "{catalogs_dir}/test/{project}_{sim_version}_{selection}_baseline_100k.hdf5"
  - FileTemplate:
      name: train_file_100k
      path_template: "{catalogs_dir}/train/{project}_{sim_version}_{selection}_baseline_100k.hdf5"
  - FileTemplate:
      name: train_file_100k_lsst
      path_template: "{catalogs_dir}/train/{project}_{sim_version}_{selection}_baseline_100k_lsst.hdf5"
  - FileTemplate:
      name: test_file_100k_lsst
      path_template: "{catalogs_dir}/test/{project}_{sim_version}_{selection}_baseline_100k_lsst.hdf5"
  - FileTemplate:
      name: train_file_100k_lsst_1yr
      path_template: "{catalogs_dir}/train/{project}_{sim_version}_{selection}_baseline_100k_lsst_1yr.hdf5"
  - FileTemplate:
      name: test_file_100k_lsst_1yr
      path_template: "{catalogs_dir}/test/{project}_{sim_version}_{selection}_baseline_100k_lsst_1yr.hdf5"
  - FileTemplate:
      name: train_file_100k_lsst_4yr
      path_template: "{catalogs_dir}/train/{project}_{sim_version}_{selection}_baseline_100k_lsst_4yr.hdf5"
  - FileTemplate:
      name: test_file_100k_lsst_4yr
      path_template: "{catalogs_dir}/test/{project}_{sim_version}_{selection}_baseline_100k_lsst_4yr.hdf5"
  - FileTemplate:
      name: train_file_100k_lsst_10yr
      path_template: "{catalogs_dir}/train/{project}_{sim_version}_{selection}_baseline_100k_lsst_10yr.hdf5"
  - FileTemplate:
      name: test_file_100k_lsst_10yr
      path_template: "{catalogs_dir}/test/{project}_{sim_version}_{selection}_baseline_100k_lsst_10yr.hdf5"
  - FileTemplate:
      name: train_file_100k_lsst_1yr_spec_select
      path_template: "{catalogs_dir}/train/{project}_{sim_version}_{selection}_baseline_100k_lsst_1yr_spec_select.hdf5"
  - FileTemplate:
      name: test_file_100k_lsst_1yr_spec_select
      path_template: "{catalogs_dir}/test/{project}_{sim_version}_{selection}_baseline_100k_lsst_1yr_spec_select.hdf5"


# These describe all the algorithms that emulate spectroscopic selections
SpecSelections:
  # - SpecSelection:
  #      name: GAMA:
  #      Select: SpecSelection_GAMA
  #      Module: rail.creation.degraders.spectroscopic_selections
  # - SpecSelection:
  #      name: BOSS
  #      Select: SpecSelection_BOSS
  #      Module: rail.creation.degraders.spectroscopic_selections
  #  - SpecSelection:
  #      name: VVDSf02
  #      Select: SpecSelection_VVDSf02
  #      Module: rail.creation.degraders.spectroscopic_selections
  - SpecSelection:
      name: zCOSMOS
      Select: SpecSelection_zCOSMOS
      Module: rail.creation.degraders.spectroscopic_selections
  - SpecSelection:
      name: HSC
      Select: SpecSelection_HSC
      Module: rail.creation.degraders.spectroscopic_selections


# These describe all the algorithms that estimate PZ
PZAlgorithms:
  - PZAlgorithm:
      name: trainz
      Estimate: TrainZEstimator
      Inform: TrainZInformer
      Module: rail.estimation.algos.train_z
  - PZAlgorithm:
      name: simplenn
      Estimate: SklNeurNetEstimator
      Inform: SklNeurNetInformer
      Module: rail.estimation.algos.sklearn_neurnet
  - PZAlgorithm:
      name: fzboost
      Estimate: FlexZBoostEstimator
      Inform: FlexZBoostInformer
      Module: rail.estimation.algos.flexzboost
  - PZAlgorithm:
      name: knn
      Estimate: KNearNeighEstimator
      Inform: KNearNeighInformer
      Module: rail.estimation.algos.k_nearneigh
  - PZAlgorithm:
      name: gpz
      Estimate: GPzEstimator
      Inform: GPzInformer
      Module: rail.estimation.algos.gpz
  - PZAlgorithm:
      name: bpz
      Estimate: BPZliteEstimator
      Inform: BPZliteInformer
      Module: rail.estimation.algos.bpz_lite
  - PZAlgorithm:
      name: tpz
      Estimate: TPZliteEstimator
      Inform: TPZliteInformer
      Module: rail.estimation.algos.tpz_lite


# These describe the ways we can sub-sample the data
Subsamplers:
  - Subsampler:
      name: random_subsampler
      Subsample: RandomSubsampler
      Module: rail.projects.subsampler
  - Subsampler:
      name: multi_catalog_subsampler
      Subsample: MultiCatalogSubsampler
      Module: rail.projects.subsampler


# These describe the ways we can reduce the data
Reducers:
  - Reducer:
      name: roman_rubin
      Reduce: RomanRubinReducer
      Module: rail.projects.reducer
  - Reducer:
      name: flagship
      Reduce: FlagshipReducer
      Module: rail.projects.reducer
  - Reducer:
      name: cardinal
      Reduce: CardinalReducer
      Module: rail.projects.reducer

Mergers:
  - Merger:
      name: spec_selection
      Merge: SpecSelectionMerger
      Module: rail.projects.merger

Merges:
  - Merge:
      name: select_lsst_all
      inputs:
        hsc: output_select_lsst_HSC.pq
        cosmos: output_select_lsst_zCOSMOS.pq
      output_basename: output_select_lsst_all.pq
      merge_col: object_id
  - Merge:
      name: select_lsst_obs_cond_10yr_all
      inputs:
        hsc: output_select_lsst_obs_cond_10yr_HSC.pq
        cosmos: output_select_lsst_obs_cond_10yr_zCOSMOS.pq
      output_basename: output_select_lsst_obs_cond_10yr_all.pq
      merge_col: object_id
  - Merge:
      name: select_lsst_obs_cond_1yr_all
      inputs:
        hsc: output_select_lsst_obs_cond_1yr_HSC.pq
        cosmos: output_select_lsst_obs_cond_1yr_zCOSMOS.pq
      output_basename: output_select_lsst_obs_cond_1yr_all.pq
      merge_col: object_id
  - Merge:
      name: select_lsst_obs_cond_4yr_all
      inputs:
        hsc: output_select_lsst_obs_cond_4yr_HSC.pq
        cosmos: output_select_lsst_obs_cond_4yr_zCOSMOS.pq
      output_basename: output_select_lsst_obs_cond_4yr_all.pq
      merge_col: object_id


# These describe the selections going from Input to Reduced catalog
Selections:
  - Selection:
      name: gold
      cuts:
        maglim_i: [null, 25.5]
  - Selection:
      name: deep
      cuts:
        maglim_i: [null, 27.0]


# These describe ways to subsampe the data
Subsamples:
  - Subsample:
      name: test_100k
      seed: 1234
      num_objects: 100000
  - Subsample:
      name: train_100k
      seed: 4321
      num_objects: 100000
  - Subsample:
      name: "train_wfd_1yr_100k"
      object_id_col: "object_id"
      seed: 1234
      num_objects: 100000
      inputs:
        rubin:
          basename: output_deredden_lsst_obs_cond_1yr.pq
          bands: ['u', 'g', 'r', 'i', 'z', 'y']
          mag_band_name_template: "mag_{band}_lsst"
          mag_err_band_name_template: "mag_{band}_lsst_err"
          extra_cols: ['redshift']
        roman:
          basename: output_deredden_roman_medium.pq
          bands: ['Y', 'J', 'H']
          mag_band_name_template: "mag_{band}_roman"
          mag_err_band_name_template: "mag_{band}_roman_err"
          extra_cols: []
