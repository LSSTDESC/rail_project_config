Project:

  Includes:
    - "${RAIL_PROJECT_CONFIG_DIR}/data_challenge/preparation_library.yaml"

  Name: pz_challenge

  PathTemplates: {}

  # These are used to make all the other paths
  CommonPaths:
    project: pz_challenge_test
    root: "/global/cfs/projectdirs/desc-pz/users/tqzhang/data_challenge/desi_threshold/rail_project_root"
    # root: "/global/cfs/cdirs/lsst/groups/PZ/data"
    scratch_root: "{root}"
    catalogs_dir:  "/global/cfs/projectdirs/desc-pz/users/tqzhang/data_challenge/desi_threshold/rail_project_root"
    # catalogs_dir:  "/global/cfs/cdirs/lsst/groups/PZ/data"
    reduced_dir: "/global/cfs/cdirs/lsst/groups/PZ/data"

  # Baseline configuraiton, included in others by default
  Baseline:
    catalog_tag: flagship
    pipelines: ['all']


  Flavors:
    - Flavor:
       name: prepare_flagship
       pipelines: ['truth_to_observed']
       pipeline_overrides:
         default:
           kwargs:
             error_models: ['lsst_obs_cond_1yr', 'lsst_obs_cond_4yr', 'lsst_obs_cond_10yr', 'lsst']
             selectors: ['DESI_BGS_flagship', 'DESI_LRG_flagship', 'DESI_ELG_flagship', 'zCOSMOS', 'VVDSf02', 'DEEP2_LSST']

  # These are variables that we iterate over when running over entire catalogs
  IterationVars:
    pixel:
      - 25

