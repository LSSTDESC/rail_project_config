  # These are used to make all the other paths
  CommonPaths:
    sim_version: flagship

  Flavors:
    - Flavor:
        name: flagship
        pipeline_overrides:
          truth_to_observed:
            kwargs:
              selectors: ['DESI_BGS_flagship', 'DESI_LRG_flagship', 'DESI_ELG_flagship', 'zCOSMOS', 'VVDSf02', 'DEEP2_LSST']
	      
