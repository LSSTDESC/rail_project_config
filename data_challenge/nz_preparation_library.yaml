  - Merge:
      # merge all the selections run on the 'lsst_4yr' photometric smearing
      name: select_lsst_obs_cond_4yr_refz_cardinal_blended
      inputs:
        DEEP2_LSST:
          basename: output_select_lsst_obs_cond_4yr_DEEP2_LSST.pq
          cone_cut: [6.0, -46.0, 0.80]
        DESI_BGS: output_select_lsst_obs_cond_4yr_DESI_BGS_color.pq
        DESI_ELG_LOP: output_select_lsst_obs_cond_4yr_DESI_ELG_LOP_color.pq
        DESI_LRG: output_select_lsst_obs_cond_4yr_DESI_LRG_color.pq
        VVDSf02:
          basename: output_select_lsst_obs_cond_4yr_VVDSf02.pq
          cone_cut: [8.0, -44.0, 0.44]
        zCOSMOS:
          basename: output_select_lsst_obs_cond_4yr_zCOSMOS.pq
          cone_cut: [12.0, -42.0, 0.74]
        COSMOS:
          basename: output_select_lsst_obs_cond_4yr_COSMOS2020.pq
          cone_cut: [12.0, -42.0, 0.74]
      output_basename: output_select_lsst_obs_cond_4yr_refz.pq
