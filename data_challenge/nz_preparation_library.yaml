# Project name
Name: nz_challenge


# Catalog definitions
CatalogLib:
  - "${RAIL_PROJECT_CONFIG_DIR}/data_challenge/catalogs.yaml"


# Templates for various paths
PathTemplates: {}


# These are used to make all the other paths
CommonPaths:
  parent: pz_challenge
  project: nz_challenge
  root: "{PZ_BASE_AREA}"
  scratch_root: "{root}"
  catalogs_dir: "{root}/data"


# Baseline configuraiton, included in others by default
Baseline:
  catalog_tag: roman_rubin
  pipelines: ['all']


# These are templates for catalogs produced in the early stages of the analysis
Catalogs:
  # Generic degraed catalogs
  - CatalogTemplate:
      name: degraded
      path_template: "{catalogs_dir}/{parent}_{sim_version}_{selection}_{flavor}/{pixel}/{basename}"
      iteration_vars: ['pixel']


# These are templates for specific files, such as testing and training files
Files:
  - FileTemplate:
      name: taskset_1_dp2_ddf
      path_template: "{catalogs_dir}/public/{project}_taskset_1_{sim_version}_dp2_ddf_{label}.hdf5"
  - FileTemplate:
      name: taskset_1_dp2_wfd
      path_template: "{catalogs_dir}/reserved/{project}_taskset_1_{sim_version}_dp2_wfd.hdf5"
  - FileTemplate:
      name: taskset_1_1yr_ddf
      path_template: "{catalogs_dir}/public/{project}_taskset_1_{sim_version}_1yr_ddf_{label}.hdf5"
  - FileTemplate:
      name: taskset_1_1yr_wfd
      path_template: "{catalogs_dir}/reserved/{project}_taskset_1_{sim_version}_1yr_wfd.hdf5"
  - FileTemplate:
      name: taskset_1_4yr_ddf
      path_template: "{catalogs_dir}/public/{project}_taskset_1_{sim_version}_4yr_ddf_{label}.hdf5"
  - FileTemplate:
      name: taskset_1_4yr_wfd
      path_template: "{catalogs_dir}/reserved/{project}_taskset_1_{sim_version}_4yr_wfd.hdf5"


# These describe the selections going from Truth to Reduced catalog
# These are applied by the reducers
Selections:
  - Selection:
      name: gold
      cuts:
        maglim_i: [null, 25.5]
      healpix_cuts:
        ra_col: ra
        dec_col: dec
        nside: 32
        nest: false
        pixels: [9921, 9922, 9923, 9924, 10050, 10051, 10052, 10053, 10177, 10178, 10179, 10180, 10181, 10305, 10306, 10307, 10308, 10429, 10430, 10431, 10432, 10549, 10550, 10551, 10552, 10665, 10666, 10667, 10668, 10777, 10778, 10779]


# These are the classes that we used to merge data from different files
# in particular, to merge the spectroscopic selections
Mergers:
  - Merger:
      name: spec_selection
      Merge: SpecSelectionMerger
      Module: rail.projects.merger


# These are the various ways we merge the spectrscopic selections
Merges:
  - Merge:
      # merge all the selections run on the 'lsst_4yr' photometric smearing
      name: select_lsst_obs_cond_4yr_all_cardinal
      inputs:
        DEEP2_LSST: output_select_lsst_obs_cond_4yr_DEEP2_LSST.pq
        DESI_BGS: output_select_lsst_obs_cond_4yr_DESI_BGS_color.pq
        DESI_ELG_LOP: output_select_lsst_obs_cond_4yr_DESI_ELG_LOP_color.pq
        DESI_LRG: output_select_lsst_obs_cond_4yr_DESI_LRG_color.pq
        VVDSf02: output_select_lsst_obs_cond_4yr_VVDSf02.pq
        zCOSMOS: output_select_lsst_obs_cond_4yr_zCOSMOS.pq
      output_basename: output_select_lsst_obs_cond_4yr_all.pq
      merge_col: object_id
  - Merge:
      # merge all the selections run on the 'lsst_1yr' photometric smearing
      name: select_lsst_obs_cond_1yr_all_cardinal
      inputs:
        DEEP2_LSST: output_select_lsst_obs_cond_1yr_DEEP2_LSST.pq
        DESI_BGS: output_select_lsst_obs_cond_1yr_DESI_BGS_color.pq
        DESI_ELG_LOP: output_select_lsst_obs_cond_1yr_DESI_ELG_LOP_color.pq
        DESI_LRG: output_select_lsst_obs_cond_1yr_DESI_LRG_color.pq
        VVDSf02: output_select_lsst_obs_cond_1yr_VVDSf02.pq
        zCOSMOS: output_select_lsst_obs_cond_1yr_zCOSMOS.pq
      output_basename: output_select_lsst_obs_cond_1yr_all.pq
      merge_col: object_id
  - Merge:
      # merge all the selections run on the 'lsst_4yr' photometric smearing
      name: select_lsst_obs_cond_4yr_all_flagship
      inputs:
        DEEP2_LSST: output_select_lsst_obs_cond_4yr_DEEP2_LSST.pq
        DESI_BGS: output_select_lsst_obs_cond_4yr_DESI_BGS_flagship.pq
        DESI_ELG_LOP: output_select_lsst_obs_cond_4yr_DESI_ELG_flagship.pq
        DESI_LRG: output_select_lsst_obs_cond_4yr_DESI_LRG_flagship.pq
