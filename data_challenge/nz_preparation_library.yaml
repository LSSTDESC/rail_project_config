# These are the classes that we use to subsample the data
# I.e., to build a single test/train file from an input catalog
Subsamplers:
  - Subsampler:
      # This one combines information from a few files, e.g., roman, rubin, euclid
      name: multi_catalog_subsampler
      Subsample: MultiCatalogSubsampler
      Module: rail.projects.subsampler


# These describe ways to subsample the data
Subsamples:
  - Subsample:
      # Combine roman and rubin 1yr
      name: "taskset_1_1yr_ddf"
      object_id_col: "object_id"
      seed: 1231
      num_objects: 1000000
      inputs:
        rubin:
          basename: output_select_lsst_obs_cond_1yr_all.pq
          bands: ['u', 'g', 'r', 'i', 'z', 'y']
          mag_band_name_template: "mag_{band}_lsst"
          mag_err_band_name_template: "mag_{band}_lsst_err"
          cuts:
            - ['mag_i_lsst', '<', 23]
          extra_cols: ['redshift', 'ra', 'dec', 'DEEP2_LSST', 'DESI_BGS', 'DESI_ELG_LOP', 'DESI_LRG', 'VVDSf02', 'zCOSMOS']
        roman:
          basename: output_deredden_roman_medium.pq
          bands: ['Y', 'J', 'H']
          mag_band_name_template: "mag_{band}_roman"
          mag_err_band_name_template: "mag_{band}_roman_err"
          extra_cols: []
        cosmos:
          basename: output_select_lsst_obs_cond_1yr_COSMOS2020.pq
          bands: []
          mag_band_name_template: ""
          mag_err_band_name_template: ""
          extra_cols: ["redshift_manyband"]
  - Subsample:
      # Combine roman and rubin 1yr
      name: "taskset_1_1yr_wfd"
      object_id_col: "object_id"
      seed: 2231
      num_objects: 1000000
      inputs:
        rubin:
          basename: output_deredden_lsst_obs_cond_1yr.pq
          bands: ['u', 'g', 'r', 'i', 'z', 'y']
          mag_band_name_template: "mag_{band}_lsst"
          mag_err_band_name_template: "mag_{band}_lsst_err"
          extra_cols: ['redshift', 'ra', 'dec']
          cuts:
            - ['mag_i_lsst', '<', 23]
        roman:
          basename: output_deredden_roman_medium.pq
          bands: ['Y', 'J', 'H']
          mag_band_name_template: "mag_{band}_roman"
          mag_err_band_name_template: "mag_{band}_roman_err"
