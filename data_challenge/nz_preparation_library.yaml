        VVDSf02:
          basename: output_select_lsst_obs_cond_1yr_VVDSf02.pq
          cone_cut: [8.0, -44.0, 0.44]
        zCOSMOS:
          basename: output_select_lsst_obs_cond_1yr_zCOSMOS.pq
          cone_cut: [12.0, -42.0, 0.74]
        COSMOS:
          basename: output_select_lsst_obs_cond_1yr_COSMOS2020.pq
