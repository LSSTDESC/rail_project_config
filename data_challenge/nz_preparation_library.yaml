# Project name
Name: nz_challenge


# Catalog definitions
CatalogLib:
  - "${RAIL_PROJECT_CONFIG_DIR}/data_challenge/catalogs.yaml"


# Templates for various paths
PathTemplates: {}


# These are used to make all the other paths
CommonPaths:
  parent: pz_challenge
  project: nz_challenge
  root: "{PZ_BASE_AREA}"
  scratch_root: "{root}"
  catalogs_dir: "{root}/data"


# Baseline configuraiton, included in others by default
Baseline:
  catalog_tag: roman_rubin
  pipelines: ['all']


# These are templates for catalogs produced in the early stages of the analysis
Catalogs:
  # Generic degraed catalogs
  - CatalogTemplate:
      name: degraded
      path_template: "{catalogs_dir}/{parent}_{sim_version}_{selection}_{flavor}/{pixel}/{basename}"
      iteration_vars: ['pixel']


# These are templates for specific files, such as testing and training files
Files:
  - FileTemplate:
      name: taskset_1_dp2_ddf
      path_template: "{catalogs_dir}/public/{project}_taskset1_{sim_version}_dp2_ddf_{label}.hdf5"
  - FileTemplate:
      name: taskset_1_dp2_wfd
      path_template: "{catalogs_dir}/reserved/{project}_taskset1_{sim_version}_dp2_wfd_{label}.hdf5"
  - FileTemplate:
      name: taskset_1_1yr_ddf
      path_template: "{catalogs_dir}/public/{project}_taskset1_{sim_version}_1yr_ddf_{label}.hdf5"
  - FileTemplate:
      name: taskset_1_1yr_wfd
      path_template: "{catalogs_dir}/reserved/{project}_taskset1_{sim_version}_1yr_wfd_{label}.hdf5"
  - FileTemplate:
      name: taskset_1_4yr_ddf
      path_template: "{catalogs_dir}/public/{project}_taskset1_{sim_version}_4yr_ddf_{label}.hdf5"
  - FileTemplate:
      name: taskset_1_4yr_wfd
      path_template: "{catalogs_dir}/reserved/{project}_taskset1_{sim_version}_4yr_wfd_{label}.hdf5"


# These describe the selections going from Truth to Reduced catalog
# These are applied by the reducers
Selections:
  - Selection:
      name: gold
      cuts:
        maglim_i: [null, 25.5]
      healpix_cuts:
        ra_col: ra
        dec_col: dec
        nside: 32
        nest: false
        pixels: [9921, 9922, 9923, 9924, 10050, 10051, 10052, 10053, 10177, 10178, 10179, 10180, 10181, 10305, 10306, 10307, 10308, 10429, 10430, 10431, 10432, 10549, 10550, 10551, 10552, 10665, 10666, 10667, 10668, 10777, 10778, 10779]


# These are the classes that we use to subsample the data
# I.e., to build a single test/train file from an input catalog
Subsamplers:
  - Subsampler:
      # This one combines information from a few files, e.g., roman, rubin, euclid
      name: multi_catalog_subsampler
      Subsample: MultiCatalogSubsampler
      Module: rail.projects.subsampler


# These describe ways to subsample the data
Subsamples:
  - Subsample:
      # Rubin dp2
      name: "taskset_1_dp2_ddf"
      object_id_col: "object_id"
      seed: 1230
      num_objects: 10000000
      inputs:
        rubin:
          basename: output_deredden_lsst_obs_cond_dp2.pq
          bands: ['u', 'g', 'r', 'i', 'z', 'y']
          mag_band_name_template: "mag_{band}_lsst"
          mag_err_band_name_template: "mag_{band}_lsst_err"
          cuts:
            - ['mag_i_lsst', '<', 23]
          extra_cols: ['redshift', 'ra', 'dec']
  - Subsample:
      # Rubin dp2
      name: "taskset_1_dp2_wfd"
      object_id_col: "object_id"
      seed: 2230
      num_objects: 10000000
      inputs:
        rubin:
          basename: output_deredden_lsst_obs_cond_dp2.pq
          bands: ['u', 'g', 'r', 'i', 'z', 'y']
          mag_band_name_template: "mag_{band}_lsst"
          mag_err_band_name_template: "mag_{band}_lsst_err"
          extra_cols: ['redshift', 'ra', 'dec']
          cuts:
            - ['mag_i_lsst', '<', 23]
  - Subsample:
      # Combine roman and rubin 1yr
      name: "taskset_1_1yr_ddf"
      object_id_col: "object_id"
      seed: 1231
      num_objects: 10000000
      inputs:
        rubin:
          basename: output_deredden_lsst_obs_cond_1yr.pq
          bands: ['u', 'g', 'r', 'i', 'z', 'y']
          mag_band_name_template: "mag_{band}_lsst"
          mag_err_band_name_template: "mag_{band}_lsst_err"
          cuts:
            - ['mag_i_lsst', '<', 23]
          extra_cols: ['redshift', 'ra', 'dec']
        roman:
          basename: output_deredden_roman_medium.pq
          bands: ['Y', 'J', 'H']
          mag_band_name_template: "mag_{band}_roman"
          mag_err_band_name_template: "mag_{band}_roman_err"
          extra_cols: []
  - Subsample:
      # Combine roman and rubin 1yr
      name: "taskset_1_1yr_wfd"
      object_id_col: "object_id"
      seed: 2231
      num_objects: 10000000
      inputs:
        rubin:
          basename: output_deredden_lsst_obs_cond_1yr.pq
          bands: ['u', 'g', 'r', 'i', 'z', 'y']
          mag_band_name_template: "mag_{band}_lsst"
          mag_err_band_name_template: "mag_{band}_lsst_err"
          extra_cols: ['redshift', 'ra', 'dec']
          cuts:
            - ['mag_i_lsst', '<', 23]
        roman:
          basename: output_deredden_roman_medium.pq
          bands: ['Y', 'J', 'H']
          mag_band_name_template: "mag_{band}_roman"
          mag_err_band_name_template: "mag_{band}_roman_err"
          extra_cols: []
  - Subsample:
      # Combine roman and rubin 14r
      name: "taskset_1_4yr_ddf"
      object_id_col: "object_id"
      seed: 1232
      num_objects: 10000000
      inputs:
        rubin:
          basename: output_deredden_lsst_obs_cond_4yr.pq
          bands: ['u', 'g', 'r', 'i', 'z', 'y']
          mag_band_name_template: "mag_{band}_lsst"
          mag_err_band_name_template: "mag_{band}_lsst_err"
          cuts:
            - ['mag_i_lsst', '<', 23]
          extra_cols: ['redshift', 'ra', 'dec']
        roman:
          basename: output_deredden_roman_medium.pq
          bands: ['Y', 'J', 'H']
          mag_band_name_template: "mag_{band}_roman"
          mag_err_band_name_template: "mag_{band}_roman_err"
          extra_cols: []
  - Subsample:
      # Combine roman and rubin 4yr
      name: "taskset_1_4yr_wfd"
      object_id_col: "object_id"
      seed: 2231
      num_objects: 10000000
      inputs:
        rubin:
          basename: output_deredden_lsst_obs_cond_4yr.pq
          bands: ['u', 'g', 'r', 'i', 'z', 'y']
          mag_band_name_template: "mag_{band}_lsst"
          mag_err_band_name_template: "mag_{band}_lsst_err"
          extra_cols: ['redshift', 'ra', 'dec']
          cuts:
            - ['mag_i_lsst', '<', 23]
        roman:
          basename: output_deredden_roman_medium.pq
          bands: ['Y', 'J', 'H']
          mag_band_name_template: "mag_{band}_roman"
          mag_err_band_name_template: "mag_{band}_roman_err"
        extra_cols: []
