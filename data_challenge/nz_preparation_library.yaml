      inputs:
        DEEP2_LSST: output_select_lsst_obs_cond_1yr_DEEP2_LSST.pq
        DESI_BGS: output_select_lsst_obs_cond_1yr_DESI_BGS_flagship.pq
        DESI_ELG_LOP: output_select_lsst_obs_cond_1yr_DESI_ELG_flagship.pq
        DESI_LRG: output_select_lsst_obs_cond_1yr_DESI_LRG_flagship.pq
