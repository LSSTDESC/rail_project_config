Project:

  Includes:
    - "${RAIL_PROJECT_CONFIG_DIR}/data_challenge/preparation_library.yaml"

  Name: pz_challenge

  CatalogLib:
    - "${RAIL_PROJECT_CONFIG_DIR}/data_challenge/catalogs.yaml"

  PathTemplates: {}

  # These are used to make all the other paths
  CommonPaths:
    parent: pz_challenge_test
    project: pz_challenge_test_v2
    sim_version: roman_rubin
    root: "{PZ_BASE_AREA}"
    scratch_root: "{root}"
    catalogs_dir: "{root}/data"

  # Baseline configuraiton, included in others by default
  Baseline:
    catalog_tag: data_challenge_roman_rubin
    pipelines: ['all']

  Flavors:
    - Flavor:
        name: prepare_roman_rubin
        pipeline_overrides:
          truth_to_observed:
            error_models: ['lsst', 'lsst_obs_cond_1yr', 'lsst_obs_cond_4yr', 'lsst_obs_cond_10yr', 'roman_wide', 'roman_medium']
            models_to_run_select: ['lsst', 'lsst_obs_cond_1yr', 'lsst_obs_cond_4yr', 'lsst_obs_cond_10yr']
          photometric_errors:
            error_models: ['lsst', 'lsst_obs_cond_1yr', 'lsst_obs_cond_4yr', 'lsst_obs_cond_10yr', 'roman_wide', 'roman_medium']

