Project:

  Includes:
    - "${RAIL_PROJECT_CONFIG_DIR}/data_challenge/preparation_library.yaml"

  Name: pz_challenge

  PathTemplates: {}

  # These are used to make all the other paths
  CommonPaths:
    project: pz_challenge_test
    root: "/global/cfs/projectdirs/desc-pz/users/tqzhang/data_challenge/desi_threshold/rail_project_root"
    scratch_root: "{root}"
    catalogs_dir:  "/global/cfs/projectdirs/desc-pz/users/tqzhang/data_challenge/desi_threshold/rail_project_root"
    reduced_dir: "/global/cfs/cdirs/lsst/groups/PZ/data"

  # Baseline configuraiton, included in others by default
  Baseline:
    catalog_tag: roman_plus_rubin
    pipelines: ['all']

  Flavors:
    - Flavor:
       name: prepare_roman_rubin
       pipelines: ['truth_to_observed']
       pipeline_overrides:
         default:
           kwargs:
             # error_models: ['lsst_obs_cond_1yr']
             # selectors: ['DESI_BGS', 'DESI_LRG', 'DESI_ELG']
             error_models: ['lsst_obs_cond_1yr', 'lsst_obs_cond_4yr', 'lsst_obs_cond_10yr', 'lsst']
             selectors: ['DESI_BGS', 'DESI_LRG', 'DESI_ELG', 'zCOSMOS', 'VVDSf02', 'DEEP2_LSST']
         # truth_to_observed:
         #   select_lsst_obs_cond_1yr_DESI_LRG:
         #     desi_type: 'lrg'
         #     threshold_col: 'logsm_obs'
         #     threshold_table: '/global/cfs/cdirs/desc-pz/users/tqzhang/data_challenge/desi_threshold/roman_rubin_desi_thresh/lrg_threshold.parquet'
         #   select_lsst_obs_cond_1yr_DESI_ELG:
         #     desi_type: 'elg'
         #     threshold_col: 'sfr'
         #     threshold_table: '/global/cfs/cdirs/desc-pz/users/tqzhang/data_challenge/desi_threshold/roman_rubin_desi_thresh/elg_threshold.parquet'
         #   select_lsst_obs_cond_1yr_DESI_BGS:
         #     desi_type: 'bgs'
         #     threshold_col: 'sod_halo_mass'
         #     threshold_table: '/global/cfs/cdirs/desc-pz/users/tqzhang/data_challenge/desi_threshold/roman_rubin_desi_thresh/bgs_threshold.parquet'

  # These are variables that we iterate over when running over entire catalogs
  IterationVars:
    pixel:
      - 10050
