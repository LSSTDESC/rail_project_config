Project:

  Name: dp2_v3p1

  Includes:
    - '${RAIL_PROJECT_CONFIG_DIR}/dp2/dp2_library.yaml'

  PathTemplates: {}

  # These are used to make all the other paths
  CommonPaths:
    parent: dp2
    project: dp2_v3p1
    root: '{PZ_BASE_AREA}'
    scratch_root: "{root}"
    catalogs_dir: "{root}/data"

  Baseline:
    catalog_tag: lsst_gaap_1p0
    pipelines: ['all']
    file_aliases:  # Set the training and test files
      test: test_file_v3p1
      train: train_file_v3p1
    pipeline_overrides:
      default:
        kwargs:
          algorithms: ['fzboost', 'knn', 'gpz', 'bpz', 'dnf', 'tpz', 'lephare']

  Flavors:

    - Flavor:
        name: dp2_6band
        catalog_tag: lsst_gaap_1p0
        pipeline_overrides:
          default:
            kwargs:
              algorithms: ['fzboost', 'knn', 'gpz', 'bpz', 'dnf', 'tpz', 'lephare']
          estimate:
            estimate_bpz:
              no_prior: false
              madau_flag: 'yes'
              filter_list: ['lsstcam_u', 'lsstcam_g', 'lsstcam_r', 'lsstcam_i', 'lsstcam_z', 'lsstcam_y']
              spectra_file: 'cosmossedswdust136.list'
              zp_errors:
                - 0.03
                - 0.03
                - 0.03
                - 0.03
                - 0.03
                - 0.03
          pz:
            inform_knn:
              nneigh_max: 10
            inform_gpz:
              gpz_method: 'VD'
              max_iter: 1000
            inform_tpz:
              tree_strategy: 'sklearn'
              nrandom: 10
              ntrees: 10
              sigmafactor: 1
              minleaf: 2
            inform_fzboost:
              max_basis: 50
              nsharp: 1
              nbump: 1
              bumpmin: 0.02 
              bumpmax: 0.02
              sharpmin: 1.2
              sharpmax: 1.2
            inform_bpz:
              nt_array: [7, 57, 72]
              output_hdfn: true
              filter_list: ['lsstcam_u', 'lsstcam_g', 'lsstcam_r', 'lsstcam_i', 'lsstcam_z', 'lsstcam_y']
            estimate_bpz:
              no_prior: false
              madau_flag: 'yes'
              filter_list: ['lsstcam_u', 'lsstcam_g', 'lsstcam_r', 'lsstcam_i', 'lsstcam_z', 'lsstcam_y']
              spectra_file: 'cosmossedswdust136.list'
              zp_errors:
                - 0.03
                - 0.03
                - 0.03
                - 0.03
                - 0.03
                - 0.03
            inform_lephare:
	      lephare.ADAPT_BAND: '4'
              lephare.ADAPT_CONTEXT: '-1'
              lephare.ADAPT_LIM: 22,24.5
              lephare.ADAPT_MODBIN: 1,1000
              lephare.ADAPT_ZBIN: 0.01,6
              lephare.ADDITIONAL_MAG: none
              lephare.ADD_DUSTEM: 'NO'
              lephare.ADD_EMLINES: 0,10000
              lephare.AGE_RANGE: 0.,15.e9
              lephare.AUTO_ADAPT: 'YES'
              lephare.CAT_FMT: MEME
              lephare.CAT_IN: bidon
              lephare.CAT_LINES: 0,1000000000
              lephare.CAT_MAG: AB
              lephare.CAT_OUT: zphot.out
              lephare.CAT_TYPE: LONG
              lephare.CHI2_OUT: 'NO'
              lephare.COSMOLOGY: 70,0.3,0.7
              lephare.DZ_WIN: '0.25'
              lephare.EBV_RANGE: 0,9
              lephare.EB_V: 0.,0.05,0.1,0.15,0.2,0.25,0.3,0.35,0.4,0.5
              lephare.EM_DISPERSION: 0.5,0.75,1.,1.5,2.
              lephare.EM_LINES: EMP_UV
              lephare.ERR_FACTOR: '1.5'
              lephare.ERR_SCALE: 0.02,0.02,0.02,0.02,0.02,0.02
              lephare.EXTERNALZ_FILE: NONE
              lephare.EXTINC_LAW: SMC_prevot.dat,SB_calzetti.dat,SB_calzetti_bump1.dat,SB_calzetti_bump2.dat
              lephare.FILTER_CALIB: 0,0,0,0,0,0
              lephare.FILTER_FILE: filter_lsst
              lephare.FILTER_LIST: lsstcam/u.pb,lsstcam/g.pb,lsstcam/r.pb,lsstcam/i.pb,lsstcam/z.pb,lsstcam/y.pb
              lephare.FILTER_REP: /sdf/data/rubin/shared/pz/data/lephare/data/filt
              lephare.FIR_CONT: '-1'
              lephare.FIR_FREESCALE: 'YES'
              lephare.FIR_LIB: NONE
              lephare.FIR_LMIN: '7.0'
              lephare.FIR_SCALE: '-1'
              lephare.FIR_SUBSTELLAR: 'NO'
              lephare.FORB_CONTEXT: '-1'
              lephare.GAL_FSCALE: '1.'
              lephare.GAL_LIB: LSST_GAL_BIN
              lephare.GAL_LIB_IN: LSST_GAL_BIN
              lephare.GAL_LIB_OUT: LSST_GAL_MAG
              lephare.GAL_SED: /sdf/data/rubin/shared/pz/data/lephare/data/examples/COSMOS_MOD.list
              lephare.GLB_CONTEXT: '0'
              lephare.INP_TYPE: M
              lephare.LIB_ASCII: 'NO'
              lephare.LIMITS_MAPP_CUT: '90'
              lephare.LIMITS_MAPP_REF: '1'
              lephare.LIMITS_MAPP_SEL: '1'
              lephare.LIMITS_ZBIN: 0,99
              lephare.MABS_CONTEXT: '0'
              lephare.MABS_FILT: 1,2,3,4
              lephare.MABS_METHOD: '1'
              lephare.MABS_REF: '1'
              lephare.MABS_ZBIN: 0,0.5,2,4,6
              lephare.MAGTYPE: AB
              lephare.MAG_ABS: -24,-5
              lephare.MAG_ABS_QSO: -30,-10
              lephare.MAG_REF: '4'
              lephare.MIN_THRES: '0.02'
              lephare.MOD_EXTINC: 18,26,26,33,26,33,26,33
              lephare.NZ_PRIOR: 4,3
              lephare.PARA_OUT: /sdf/data/rubin/shared/pz/data/lephare/data/examples/output.para
              lephare.PDZ_OUT: test
              lephare.PDZ_TYPE: BAY_ZG
              lephare.QSO_FSCALE: '1.'
              lephare.QSO_LIB: LSST_QSO_BIN
              lephare.QSO_LIB_IN: LSST_QSO_BIN
              lephare.QSO_LIB_OUT: LSST_QSO_MAG
              lephare.QSO_SED: /sdf/data/rubin/shared/pz/data/lephare/data/sed/QSO/SALVATO09/AGN_MOD.list
              lephare.RF_COLORS: 32,4,4,13
              lephare.RM_DISCREPANT_BD: '300'
              lephare.SPEC_OUT: 'NO'
              lephare.STAR_FSCALE: '3.432E-09'
              lephare.STAR_LIB: LSST_STAR_BIN
              lephare.STAR_LIB_IN: LSST_STAR_BIN
              lephare.STAR_LIB_OUT: LSST_STAR_MAG
              lephare.STAR_SED: /sdf/data/rubin/shared/pz/data/lephare/data/sed/STAR/STAR_MOD_ALL.list
              lephare.TRANS_TYPE: '1'
              lephare.VERBOSE: 'NO'
              lephare.ZFIX: 'NO'
              lephare.ZGRID_TYPE: '0'
              lephare.ZPHOTLIB: LSST_STAR_MAG,LSST_GAL_MAG,LSST_QSO_MAG
              lephare.Z_INTERP: 'YES'
              lephare.Z_METHOD: BEST
              lephare.Z_RANGE: 0.,6.0
              lephare.Z_STEP: 0.01,0.0,6.0
