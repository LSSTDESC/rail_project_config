# These are templates for catalogs produced in the early stages of the analysis
Catalogs:
  - CatalogTemplate:
      name: reduced
      path_template: "{catalogs_dir}/dp2_input/dp2_{test_or_train}.pq"
      iteration_vars: ['test_or_train']
  - CatalogTemplate:
      name: prepared
      path_template: "{catalogs_dir}/dp2_input/{test_or_train}/dp2_{test_or_train}.pq"
      iteration_vars: ['test_or_train']

IterationVars:
  test_or_train:
    - som_mc_matched
    - clipped_v2

# Catalog definitions
CatalogLib:
  - "${RAIL_PROJECT_CONFIG_DIR}/dp2/dp2_catalogs.yaml"

# These are templates for specific files, such as testing and training files
Files:
  - FileTemplate:
      name: test_file_v0
      path_template: "{catalogs_dir}/test/{parent}_som_mc_matched.hdf5"
  - FileTemplate:
      name: train_file_v0
      path_template: "{catalogs_dir}/train/{parent}_clipped_v2.hdf5"
  - FileTemplate:
      name: test_file_v2
      path_template: "{catalogs_dir}/test/test_som_mc_matched_v2.hdf5"
  - FileTemplate:
      name: train_file_v2
      path_template: "{catalogs_dir}/train/train_clipped_v2.hdf5"
  - FileTemplate:
      name: test_file_v3
      path_template: "{catalogs_dir}/test/test_som_mc_matched_v3.hdf5"
  - FileTemplate:
      name: train_file_v3
      path_template: "{catalogs_dir}/train/train_clipped_v3.hdf5"
  - FileTemplate:
      name: test_file_v3p1
      path_template: "{catalogs_dir}/test/test_som_mc_matched_v3p1.hdf5"
  - FileTemplate:
      name: train_file_v3p1
      path_template: "{catalogs_dir}/train/train_clipped_v3p1.hdf5"


# These describe all the algorithms that estimate PZ
PZAlgorithms:
  - PZAlgorithm:
      name: simplenn
      Estimate: SklNeurNetEstimator
      Inform: SklNeurNetInformer
      Module: rail.estimation.algos.sklearn_neurnet
  - PZAlgorithm:
      name: fzboost
      Estimate: FlexZBoostEstimator
      Inform: FlexZBoostInformer
      Module: rail.estimation.algos.flexzboost
  - PZAlgorithm:
      name: knn
      Estimate: KNearNeighEstimator
      Inform: KNearNeighInformer
      Module: rail.estimation.algos.k_nearneigh
  - PZAlgorithm:
      name: gpz
      Estimate: GPzEstimator
      Inform: GPzInformer
      Module: rail.estimation.algos.gpz
  - PZAlgorithm:
      name: bpz
      Estimate: BPZliteEstimator
      Inform: BPZliteInformer
      Module: rail.estimation.algos.bpz_lite
  - PZAlgorithm:
      name: tpz
      Estimate: TPZliteEstimator
      Inform: TPZliteInformer
      Module: rail.estimation.algos.tpz_lite
  - PZAlgorithm:
      name: cmnn
      Estimate: CMNNEstimator
      Inform: CMNNInformer
      Module: rail.estimation.algos.cmnn
  - PZAlgorithm:
      name: lephare
      Estimate: LephareEstimator
      Inform: LephareInformer
      Module: rail.estimation.algos.lephare
  - PZAlgorithm:
      name: dnf
      Estimate: DNFEstimator
      Inform: DNFInformer
      Module: rail.estimation.algos.dnf


# These describe all the algorithms that classify objects into tomographic bins
Classifiers:
  - Classifier:
      name: equal_count
      Classify: EqualCountClassifier
      Module: rail.estimation.algos.equal_count
  - Classifier:
      name: uniform_binning
      Classify: UniformBinningClassifier
      Module: rail.estimation.algos.uniform_binning


# These describe all the algorithms that summarize PZ information into NZ distributions
Summarizers:
  - Summarizer:
      name: naive_stack
      Summarize: NaiveStackMaskedSummarizer
      Module: rail.estimation.algos.naive_stack
  - Summarizer:
      name: point_est_hist
      Summarize: PointEstHistMaskedSummarizer
      Module: rail.estimation.algos.point_est_hist


# These describe the various data analysis pipelines
Pipelines:
  - PipelineTemplate:
      name: inform
      pipeline_class: rail.pipelines.estimation.inform_all.InformPipeline
      input_file_templates:
        input:
          flavor: baseline
          tag: train
      kwargs:
        algorithms: ['all']
  - PipelineTemplate:
      name: estimate
      pipeline_class: rail.pipelines.estimation.estimate_all.EstimatePipeline
      input_file_templates:
        input:
          flavor: baseline
          tag: test
      kwargs:
        algorithms: ['all']
  - PipelineTemplate:
      name: evaluate
      pipeline_class: rail.pipelines.evaluation.evaluate_all.EvaluationPipeline
      input_file_templates:
        truth:
          flavor: baseline
          tag: test
      kwargs:
        algorithms: ['all']
  - PipelineTemplate:
      name: pz
      pipeline_class: rail.pipelines.estimation.pz_all.PzPipeline
      input_file_templates:
        input_train:
          flavor: baseline
          tag: train
        input_test:
          flavor: baseline
          tag: test
      kwargs:
        algorithms: ['all']
  - PipelineTemplate:
      name: tomography
      pipeline_class: rail.pipelines.estimation.tomography.TomographyPipeline
      input_file_templates:
        truth:
          flavor: baseline
          tag: test
      kwargs:
        algorithms: ['all']
        classifiers: ['all']
        summarizers: ['all']
        n_tomo_bins: 5
  - PipelineTemplate:
      name: prepare
      pipeline_class: rail.pipelines.utils.prepare_observed.PrepareObservedPipeline
      input_catalog_template: reduced
      output_catalog_template: prepared


Selections:
  - Selection:
      name: gold
      cuts:
        maglim_i: [null, 26.0]
